<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zeitplan · AC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Light mode – warm beige wie AC26 */
  --bg:#fef0e3;
  --surface:#f5e4d0;
  --surface2:#ebd5bb;
  --surface3:#dfc5a4;
  --border:rgba(10,71,56,.08);
  --border2:rgba(10,71,56,.16);
  --text:#0a4738;
  --muted:#5a8272;
  --dim:#c8d8d0;
  --accent:#0a4738;
  --accent-fg:#fef0e3;
  --today:#b06000;
  --today-bg:rgba(176,96,0,.07);
  --ms-color:#1a5fa8;

  --label-w:220px;
  --row-h:38px;
  --ms-row-h:44px;
  --hdr-h:36px;
  --hdr2-h:22px;
  --group-h:26px;
}

@media(prefers-color-scheme:dark){:root{
  --bg:#141412;
  --surface:#1e1e1b;
  --surface2:#272724;
  --surface3:#313130;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.11);
  --text:#ede9e0;
  --muted:#7a8f85;
  --dim:#333330;
  --accent:#5ddba8;
  --accent-fg:#141412;
  --today:#f5a623;
  --today-bg:rgba(245,166,35,.06);
  --ms-color:#60b4f5;
}}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ── */
.header{
  padding:11px 20px;
  border-bottom:1px solid var(--border2);
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
  background:var(--bg);
}
.logo{
  width:28px;height:28px;
  background:var(--accent);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo svg{width:14px;height:14px;fill:var(--accent-fg)}
.title{font-size:16px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ── TOOLBAR ── */
.toolbar{
  padding:8px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  background:var(--surface);
  overflow-x:auto;
  scrollbar-width:none;
}
.toolbar::-webkit-scrollbar{display:none}

.btn{
  padding:5px 13px;
  border-radius:6px;
  border:none;
  font-family:'Syne',sans-serif;
  font-size:12px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;
  transition:all .13s;
  flex-shrink:0;
}
.btn-primary{background:var(--accent);color:var(--accent-fg)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-ghost.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}

.vg{display:flex;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;flex-shrink:0}
.vb{
  padding:4px 11px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  background:none;border:none;color:var(--muted);
  cursor:pointer;border-right:1px solid var(--border2);
  transition:all .12s;white-space:nowrap;
}
.vb:last-child{border-right:none}
.vb.active{background:var(--accent);color:var(--accent-fg);font-weight:600}

.sep{width:1px;height:20px;background:var(--border2);flex-shrink:0}

.filter-sel{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:6px;
  padding:4px 9px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  cursor:pointer;flex-shrink:0;
}

/* ── STATUS LEGEND ── */
.legend{
  padding:6px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  flex-shrink:0;
  background:var(--bg);
  overflow-x:auto;scrollbar-width:none;
}
.legend::-webkit-scrollbar{display:none}
.legend-item{
  display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--muted);white-space:nowrap;flex-shrink:0;
}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-diamond{
  width:9px;height:9px;
  transform:rotate(45deg);border-radius:1px;
  background:var(--muted);opacity:.6;flex-shrink:0;
}
.legend-bar{
  width:20px;height:7px;
  border-radius:2px;
  background:var(--muted);opacity:.6;flex-shrink:0;
}
.legend-sep{width:1px;height:14px;background:var(--border2);flex-shrink:0}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}
.gantt-wrap{flex:1;overflow:hidden;position:relative}
.gantt-scroll{
  width:100%;height:100%;
  overflow:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--dim) transparent;
}
.gantt-scroll::-webkit-scrollbar{width:5px;height:5px}
.gantt-scroll::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}
.gantt-inner{display:inline-flex;flex-direction:column;min-width:100%}

/* ── HEADER ROW ── */
.gantt-hdr{
  position:sticky;top:0;z-index:10;
  display:flex;min-width:max-content;
  background:var(--bg);
  border-bottom:2px solid var(--border2);
}
.hdr-label{
  width:var(--label-w);min-width:var(--label-w);
  position:sticky;left:0;z-index:11;
  background:var(--bg);
  border-right:1px solid var(--border2);
  display:flex;align-items:flex-end;
  padding:0 14px 6px;
  flex-shrink:0;
}
.hdr-label-text{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;
}
.hdr-cols{display:flex;flex-direction:column;flex:1}
.hdr-months{display:flex;height:var(--hdr2-h);border-bottom:1px solid var(--border)}
.hdr-units{display:flex;height:var(--hdr-h)}

.mc{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
  border-right:1px solid var(--border);padding:0 2px;text-align:center;line-height:1.2;
}
.mc.today-col{color:var(--today);background:var(--today-bg);font-weight:600}
.mc.major{border-right:1px solid var(--border2);font-weight:600;color:var(--text)}
.mc.month-label{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text);
  border-right:1px solid var(--border2);
  justify-content:flex-start;padding-left:8px;
}
.mc.month-label.today-month{color:var(--today)}

/* ── ROWS ── */
.gantt-row{display:flex;min-width:max-content}

.rl{
  width:var(--label-w);min-width:var(--label-w);
  position:sticky;left:0;z-index:3;
  border-right:1px solid var(--border2);
  display:flex;align-items:center;
  background:var(--bg);
  flex-shrink:0;
  transition:background .1s;
}

/* Milestone group */
.ms-group-row{
  height:var(--ms-row-h);
  border-bottom:1px solid var(--border2);
}
.ms-group-row .rl{
  height:var(--ms-row-h);
  padding:0 14px;
  gap:8px;
  background:var(--surface);
}
.ms-group-label{
  font-size:10px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  color:var(--ms-color);
}
.ms-bars{height:var(--ms-row-h);flex:1;position:relative}

/* Regular group header */
.group-row{height:var(--group-h);border-bottom:1px solid var(--border2);border-top:1px solid var(--border)}
.group-row .rl{
  height:var(--group-h);padding:0 14px;gap:7px;
  background:var(--surface);cursor:pointer;
  user-select:none;
  transition:background .12s;
}
.group-row .rl:hover{background:var(--surface2)}
.group-row.collapsed .rl{opacity:.75}
.group-dot{width:6px;height:6px;border-radius:1px;flex-shrink:0}
.group-name{
  font-size:9px;font-weight:700;
  letter-spacing:.7px;text-transform:uppercase;
  flex:1;
}
.group-count{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;color:var(--muted);flex-shrink:0;
  background:var(--surface2);
  padding:1px 5px;border-radius:3px;
  border:1px solid var(--border2);
  transition:background .12s;
}
.group-row .rl:hover .group-count{background:var(--surface3)}
.collapse-icon{
  font-size:9px;color:var(--muted);
  transition:transform .2s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  display:inline-block;
}
.group-row.collapsed .collapse-icon{transform:rotate(-90deg)}
.group-bars{height:var(--group-h);flex:1;position:relative}

/* Task row */
.task-row{
  height:var(--row-h);
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.task-row:hover .rl{background:var(--surface)}
.task-row.selected .rl{background:var(--surface2)}
.task-row .rl{height:var(--row-h);padding:0 14px;gap:8px}

.status-dot{
  width:7px;height:7px;border-radius:50%;
  flex-shrink:0;
  transition:transform .15s;
}
.status-dot:hover{transform:scale(1.4)}
.status-not-started{background:var(--dim);outline:1.5px solid var(--muted)}
.status-in-progress{background:var(--today)}
.status-completed{background:var(--accent)}

.task-name{
  font-size:12px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.task-name.done{text-decoration:line-through;opacity:.4}

.task-asgn{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  color:var(--muted);flex-shrink:0;
  background:var(--surface2);
  padding:1px 5px;border-radius:3px;
  border:1px solid var(--border2);
}

/* Bar area */
.tbars{height:var(--row-h);flex:1;position:relative}
.ms-tbars{height:var(--ms-row-h);flex:1;position:relative}

/* Bars */
.bar{
  position:absolute;
  height:18px;border-radius:4px;
  top:10px;
  display:flex;align-items:center;overflow:hidden;
  transition:filter .12s,opacity .12s;
  cursor:pointer;
}
.bar:hover{filter:brightness(1.12)}
.bar.done{opacity:.35}
.bar-label{
  font-size:10px;font-weight:600;
  padding:0 7px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  color:rgba(255,255,255,.92);
}

/* Milestone bar (taller, more prominent) */
.ms-bar{
  position:absolute;
  height:24px;border-radius:5px;
  top:10px;
  display:flex;align-items:center;overflow:hidden;
  transition:filter .12s;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.ms-bar:hover{filter:brightness(1.1)}
.ms-bar-label{
  font-size:10px;font-weight:700;
  padding:0 8px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  color:rgba(255,255,255,.95);
}

/* Diamond (Raute) */
.diamond{
  position:absolute;
  width:14px;height:14px;
  transform:rotate(45deg);border-radius:2px;
  cursor:pointer;
  transition:filter .12s,transform .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.15);
}
.diamond:hover{filter:brightness(1.15);transform:rotate(45deg) scale(1.2)}
.diamond.done{opacity:.35}

/* Milestone diamond (bigger) */
.ms-diamond{
  position:absolute;
  width:18px;height:18px;
  transform:rotate(45deg);border-radius:3px;
  cursor:pointer;
  transition:filter .12s,transform .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.ms-diamond:hover{filter:brightness(1.1);transform:rotate(45deg) scale(1.15)}

/* Today line */
.today-line{
  position:absolute;top:0;bottom:0;width:2px;
  pointer-events:none;z-index:2;
  background:var(--today);
  opacity:.8;
}
.today-label{
  position:absolute;
  top:-18px;
  transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;font-weight:600;
  color:var(--today);
  background:var(--bg);
  padding:1px 4px;
  border-radius:3px;
  border:1px solid var(--today);
  white-space:nowrap;
  pointer-events:none;
  z-index:5;
  opacity:.9;
}

/* ── MOBILE ── */
@media(max-width:640px){
  :root{--label-w:160px;--row-h:34px;--ms-row-h:40px;--group-h:24px}
  .header{padding:9px 14px}
  .title{font-size:14px}
  .subtitle{display:none}
  .toolbar{padding:7px 14px;gap:6px}
  .legend{padding:5px 14px;gap:12px}
  .bar-label{font-size:9px;padding:0 5px}
  .ms-bar-label{font-size:9px;padding:0 6px}
}
@media(max-width:400px){
  :root{--label-w:130px}
  .btn span.btn-text{display:none}
}

/* ── DETAIL PANEL ── */
.dp{
  width:0;min-width:0;
  border-left:1px solid var(--border2);
  background:var(--surface);
  overflow:hidden;
  transition:width .22s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;display:flex;flex-direction:column;
}
.dp.open{width:270px;min-width:270px}
.dp-inner{padding:16px;overflow-y:auto;flex:1}
.dp-tag{
  display:inline-block;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  padding:2px 8px;border-radius:3px;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600;
}
.dp-title{font-size:15px;font-weight:700;margin-bottom:13px;line-height:1.35}
.dp-row{
  display:flex;gap:8px;margin-bottom:7px;
  font-size:12px;align-items:flex-start;
}
.dp-label{
  color:var(--muted);width:68px;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;padding-top:1px;
}
.dp-value{color:var(--text);flex:1;font-size:12px}
.dp-close{
  position:absolute;top:0;right:0;
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:14px;padding:2px;
}
.dp-close:hover{color:var(--text)}

@media(max-width:640px){
  .dp.open{
    position:fixed;inset:0;width:100%!important;
    min-width:0!important;z-index:50;
    border-left:none;
  }
}

/* ── MODAL ── */
.mo{
  position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:100;display:none;
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.mo.open{display:flex}
.md{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:12px;padding:22px;
  width:360px;max-width:95vw;
  max-height:90dvh;overflow-y:auto;
  position:relative;
}
.md-title{font-size:15px;font-weight:700;margin-bottom:16px}
.md-x{
  position:absolute;top:14px;right:14px;
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:15px;
}
.md-x:hover{color:var(--text)}
.fl{margin-bottom:11px}
.flb{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;color:var(--muted);
  margin-bottom:4px;display:block;
}
.fi,.fs{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);color:var(--text);
  border-radius:6px;padding:7px 10px;
  font-family:'Syne',sans-serif;font-size:13px;
  transition:border .12s;
}
.fi:focus,.fs:focus{outline:none;border-color:var(--accent)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── PDF PROGRESS ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;
  border:2px solid var(--dim);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:inline-block;vertical-align:middle;
  margin-right:8px;
}

/* Zoom controls */
.zc{display:flex;align-items:center;gap:5px;flex-shrink:0}
.zb{
  width:22px;height:22px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);border-radius:4px;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:all .1s;flex-shrink:0;
}
.zb:hover{background:var(--surface3)}
#zs{
  -webkit-appearance:none;appearance:none;
  width:70px;height:3px;border-radius:2px;
  background:var(--dim);cursor:pointer;outline:none;
}
#zs::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent);cursor:pointer}
#zs::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.zl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;text-align:right}

/* ── AUTH ── */
.auth-btn{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:6px;
  border:1px solid var(--border2);
  background:transparent;color:var(--muted);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .13s;flex-shrink:0;
}
.auth-btn:hover{background:var(--surface2);color:var(--text)}
.auth-avatar{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:var(--accent-fg);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
}
.sync-btn{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:6px;
  border:none;background:var(--accent);color:var(--accent-fg);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .13s;flex-shrink:0;
}
.sync-btn:hover{opacity:.85}
.sync-btn:disabled{opacity:.5;cursor:not-allowed}
@keyframes rotate{to{transform:rotate(360deg)}}
.spinning{animation:rotate .8s linear infinite;display:inline-block}

/* ── SYNC STATUS BAR ── */
.sync-bar{
  padding:5px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--muted);
  background:var(--surface);
}
.sync-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--dim);flex-shrink:0;
}
.sync-dot.ok{background:#2d9e6a}
.sync-dot.err{background:#c0392b}
.sync-dot.loading{background:var(--today);animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{to{opacity:.3}}

/* ── LOGIN SCREEN ── */
.login-screen{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;z-index:200;
}
.login-card{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:14px;
  padding:32px 36px;
  text-align:center;
  max-width:340px;width:90%;
}
.login-logo{
  width:44px;height:44px;
  background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
}
.login-logo svg{width:22px;height:22px;fill:var(--accent-fg)}
.login-title{font-size:18px;font-weight:800;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.login-btn{
  width:100%;padding:10px;border-radius:8px;
  border:none;background:var(--accent);color:var(--accent-fg);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:opacity .13s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{opacity:.85}
.login-hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:12px}

/* ── STAT BADGES ── */
.stat-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;font-weight:700;
  padding:1px 6px;border-radius:10px;
  flex-shrink:0;min-width:18px;text-align:center;
  transition:all .2s;
}

/* ── STATUS PILL in task row ── */
.status-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:10px;
  font-family:'IBM Plex Mono',monospace;

    s2.src = "https://alcdn.msauth.net/browser/3.7.1/js/msal-browser.min.js";
    s2.onload = () => { window._msalReady = true; };
    s2.onerror = () => { document.getElementById("loginHint").textContent = "Fehler: MSAL konnte nicht geladen werden. Bitte Seite neu laden."; };

<script>
// ── MSAL CONFIG ───────────────────────────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: "7ed3329b-9519-4f28-a63c-94f2033d6c59",
    authority: "https://login.microsoftonline.com/c8829a13-44bc-4793-96d5-1d06c2eab6ca",
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache: { cacheLocation: "sessionStorage" }
};
const SCOPES = ["Tasks.ReadWrite", "User.Read"];
let _msal = null;
let currentAccount = null;
let PLAN_ID = null;

async function getMsal(){
  // Warte bis MSAL-Bibliothek vollständig geladen ist
  let tries = 0;
  while(typeof msal === "undefined" && tries < 50){
    await new Promise(r => setTimeout(r, 100));
    tries++;
  }
  if(typeof msal === "undefined") throw new Error("MSAL-Bibliothek konnte nicht geladen werden. Bitte Seite neu laden.");
  if(!_msal){
    _msal = new msal.PublicClientApplication(MSAL_CONFIG);
    await _msal.initialize();
  }
  return _msal;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function initAuth(){
  const m = await getMsal();
  try {
    const resp = await m.handleRedirectPromise();
    if(resp) currentAccount = resp.account;
  } catch(e){ console.warn("Redirect handling:", e); }

  if(!currentAccount){
    const accounts = m.getAllAccounts();
    if(accounts.length) currentAccount = accounts[0];
  }

  if(currentAccount){
    showApp();
    await syncFromPlanner();
  }
}

async function doLogin(){
  setLoginHint("Fenster wird geöffnet…");
  try {
    const m = await getMsal();
    const resp = await m.loginPopup({scopes: SCOPES});
    currentAccount = resp.account;
    showApp();
    await syncFromPlanner();
  } catch(e) {
    setLoginHint("Anmeldung fehlgeschlagen: " + e.message);
  }
}

async function doLogout(){
  if(!confirm("Abmelden?")) return;
  const m = await getMsal();
  m.logoutPopup({account: currentAccount});
  currentAccount = null;
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("syncBtn").disabled = true;
  document.getElementById("authBtn").style.display = "none";
}

function showApp(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("syncBtn").disabled = false;
  document.getElementById("authBtn").style.display = "";
  document.getElementById("syncBar").style.display = "flex";
  const name = currentAccount.name || currentAccount.username;
  document.getElementById("authName").textContent = name.split(" ")[0];
  document.getElementById("authAvatar").textContent = name[0].toUpperCase();
  showLoading(true);
  startAutoSync();
}

function setLoginHint(msg){ document.getElementById("loginHint").textContent = msg; }

async function getToken(){
  const m = await getMsal();
  const req = { scopes: SCOPES, account: currentAccount };
  try {
    const resp = await m.acquireTokenSilent(req);
    return resp.accessToken;
  } catch(e) {
    const resp = await m.acquireTokenPopup(req);
    return resp.accessToken;
  }
}

async function graphGet(url){
  const token = await getToken();
  const resp = await fetch("https://graph.microsoft.com/v1.0" + url, {
    headers: { Authorization: "Bearer " + token }
  });
  if(!resp.ok) throw new Error(await resp.text());
  return resp.json();
}

// ── PLANNER SYNC ──────────────────────────────────────────────────────────────
// Planner percentComplete → our status
function pctToStatus(pct){
  if(pct === 100) return "completed";
  if(pct > 0)     return "in_progress";
  return "not_started";
}

function showLoading(on){
  const el = document.getElementById("loadingOverlay");
  if(el) el.style.display = on ? "flex" : "none";
}

function setSyncState(state, msg){
  const dot = document.getElementById("syncDot");
  const msgEl = document.getElementById("syncMsg");
  const btn = document.getElementById("syncBtn");
  const icon = document.getElementById("syncIcon");
  dot.className = "sync-dot " + (state === "ok" ? "ok" : state === "err" ? "err" : "loading");
  msgEl.textContent = msg;
  if(state === "loading"){
    btn.disabled = true;
    icon.className = "spinning";
    icon.textContent = "↻";
  } else {
    btn.disabled = false;
    icon.className = "";
    icon.textContent = "↻";
  }
}

async function findPlanId(){
  if(PLAN_ID) return PLAN_ID;
  // Alle Gruppen laden und nach "AC26 Planboard" suchen
  const groups = await graphGet("/me/memberOf?$select=id,displayName");
  for(const g of groups.value){
    if(!g.id) continue;
    try {
      const plans = await graphGet("/groups/" + g.id + "/planner/plans");
      const plan = plans.value.find(p => p.title === "AC26 Planboard");
      if(plan){
        PLAN_ID = plan.id;
        // Titel aus Planner übernehmen
        const titleEl = document.getElementById("appTitle");
        if(titleEl) titleEl.textContent = plan.title;
        document.title = plan.title;
        return PLAN_ID;
      }
    } catch(e){ /* Gruppe hat möglicherweise kein Planner */ }
  }
  throw new Error("Plan 'AC26 Planboard' nicht gefunden. Bitte sicherstellen dass du Mitglied der Gruppe bist.");
}

// Store planner task IDs and eTags
let plannerMeta = {};
let bucketIdMap = {}; // bucketName → bucketId

// Farben pro Bucket-Name (fix, da Planner keine Farben hat)
const BUCKET_COLORS = {
  "Meilensteine": {color:"#1a5fa8", isMilestone:true},
  "Geistliches":  {color:"#1a7a55"},
  "PR":           {color:"#b06000"},
  "Story":        {color:"#7c3aed"},
  "VLL":          {color:"#2563a8"},
  "Deko":         {color:"#8b1a5a"},
  "Verwaltung":   {color:"#c0392b"},
};
function colorForBucket(name){
  return BUCKET_COLORS[name] || {color:"#4a8070"};
}

// Planner orderHint sortierung – lexikografisch absteigend
function sortByOrderHint(arr){ return [...arr].sort((a,b) => a.orderHint < b.orderHint ? 1 : -1); }

async function syncFromPlanner(){
  if(!currentAccount) return;
  setSyncState("loading", "Synchronisiere mit Planner…");
  showLoading(true);
  try {
    const planId = await findPlanId();

    // Buckets laden und nach orderHint sortieren
    const bucketsResp = await graphGet("/planner/plans/" + planId + "/buckets");
    const sortedBuckets = sortByOrderHint(bucketsResp.value);

    // BUCKETS-Array dynamisch aus Planner aufbauen
    bucketIdMap = {};
    BUCKETS.length = 0;
    sortedBuckets.forEach(b => {
      bucketIdMap[b.name] = b.id;
      if(b.name === "Backlog / Ideen") return; // Backlog ausblenden
      const cfg = colorForBucket(b.name);
      BUCKETS.push({
        key: b.id, // Planner Bucket-ID als Key
        name: b.name,
        color: cfg.color,
        isMilestone: cfg.isMilestone || false,
        orderHint: b.orderHint,
      });
    });

    // Aufgaben laden und nach orderHint sortieren
    const tasksResp = await graphGet("/planner/plans/" + planId + "/tasks");
    const sortedTasks = sortByOrderHint(tasksResp.value);

    const newTasks = [];
    plannerMeta = {};

    sortedTasks.forEach(pt => {
      // Backlog überspringen
      const bucketName = Object.keys(bucketIdMap).find(k => bucketIdMap[k] === pt.bucketId) || "";
      if(bucketName === "Backlog / Ideen") return;
      // Nur Aufgaben mit Bucket der in BUCKETS ist
      const bucket = BUCKETS.find(b => b.key === pt.bucketId);
      if(!bucket) return;

      const start = pt.startDateTime ? pt.startDateTime.slice(0,10) : null;
      const due   = pt.dueDateTime   ? pt.dueDateTime.slice(0,10)   : null;
      if(!start && !due) return; // ohne Datum nicht anzeigen

      newTasks.push({
        id: pt.id,
        bucket: pt.bucketId, // Planner Bucket-ID
        name: pt.title,
        start: start || due,
        end: due || start,
        status: pctToStatus(pt.percentComplete),
        orderHint: pt.orderHint,
      });

      plannerMeta[pt.id] = { id: pt.id, etag: pt["@odata.etag"] || "" };
    });

    TASKS = newTasks;
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
    setSyncState("ok", `Zuletzt synchronisiert: ${timeStr} · ${TASKS.length} Aufgaben`);
    showLoading(false);
    render();
    setTimeout(scrollToToday, 80);
  } catch(e) {
    setSyncState("err", "Fehler: " + e.message);
    showLoading(false);
    console.error(e);
  }
}

function pd(s){const[y,m,d]=s.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setHours(0,0,0,0);return dt;}
function fmt(dt){return dt.toISOString().slice(0,10);}

function ad(dt,n){const d=new Date(dt);d.setDate(d.getDate()+n);return d;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function getKW(d){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-day);
  const y=dt.getUTCFullYear();
  const start=new Date(Date.UTC(y,0,1));
  return Math.ceil((((dt-start)/864e5)+1)/7);
}

// ── BUILD COLUMNS ─────────────────────────────────────────────────────────────
function buildCols(v, minD, maxD){
  v = v || view;
  if(!minD || !maxD){
    minD = new Date(today); maxD = new Date(today);
    TASKS.forEach(t=>{const s=pd(t.start),e=pd(t.end);if(s<minD)minD=s;if(e>maxD)maxD=e;});
    minD = new Date(minD); minD.setDate(1); minD.setMonth(minD.getMonth()-1);
    maxD = new Date(maxD); maxD.setMonth(maxD.getMonth()+2);
  }
  const res = [];
  const w = k => Math.round(BW[k] * zoom);

  if(v === "week"){
    let d = new Date(minD);
    const dow = d.getDay(); if(dow!==1) d.setDate(d.getDate()-(dow===0?6:dow-1));
    while(d <= maxD){
      const fi = d.getDate() <= 7;
      const kw = getKW(d);
      const td = today >= d && today <= ad(d,6);
      res.push({label:`KW ${kw}`, monthLabel: fi ? MDE[d.getMonth()]+" "+d.getFullYear() : "", date:new Date(d), w:w("week"), td, mj:fi, m:d.getMonth(), y:d.getFullYear()});
      d = ad(d,7);
    }
  } else if(v === "month"){
    let y = minD.getFullYear(), m = minD.getMonth();
    const ey = maxD.getFullYear(), em = maxD.getMonth();
    while(y < ey || (y===ey && m<=em)){
      const cw = w("month");
      const label = cw >= 50 ? MDE[m] : MDE[m].slice(0,1);
      res.push({label, date:new Date(y,m,1), w:cw, td:today.getFullYear()===y&&today.getMonth()===m, mj:m%3===0, y, m});
      m++; if(m>11){m=0;y++;}
    }
  } else if(v === "quarter"){
    let y = minD.getFullYear(), q = Math.floor(minD.getMonth()/3);
    const ey = maxD.getFullYear(), eq = Math.floor(maxD.getMonth()/3);
    while(y < ey || (y===ey && q<=eq)){
      const m = q*3;
      res.push({label:`Q${q+1} ${y}`, date:new Date(y,m,1), w:w("quarter"), td:today.getFullYear()===y&&Math.floor(today.getMonth()/3)===q, mj:true, y, q, m});
      q++; if(q>3){q=0;y++;}
    }
  }
  return res;
}

function xDate(dt, c){
  if(!c||!c.length) return 0;
  const total = c.reduce((a,x)=>a+x.w,0);
  const last = c[c.length-1];
  let le;
  if(view==="week") le = ad(last.date,7);
  else if(view==="month") le = new Date(last.y, last.m+1, 1);
  else le = new Date(last.y, last.m+3, 1);
  const s = c[0].date;
  if(dt <= s) return 0;
  if(dt >= le) return total;
  return ((dt-s)/(le-s)) * total;
}
function cx(s){return xDate(pd(s), cols);}
function bw(s,e){return Math.max(xDate(ad(pd(e),1),cols)-cx(s),4);}

// ── FILTER ────────────────────────────────────────────────────────────────────
function visibleTasks(){
  return TASKS.filter(t => {
    if(!showDone && t.status === "completed") return false;
    if(bucketFilter !== "ALL" && t.bucket !== bucketFilter) return false;
    if(statusFilter !== "ALL" && t.status !== statusFilter) return false;
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  cols = buildCols();
  const totalW = cols.reduce((a,c)=>a+c.w,0);
  const vtasks = visibleTasks();
  let html = "";

  // Leerer Zustand
  if(!TASKS.length){
    document.getElementById("ganttInner").innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;color:var(--muted)">

        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px">Keine Aufgaben geladen</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim)">Aufgaben in Planner brauchen ein Start- und Fälligkeitsdatum</div>
      </div>`;
    updateStats();
    return;
  }

  // ── Header
  html += buildHeader(totalW);

  // ── Today line (absolute, spans all rows)
  const tx = xDate(today, cols);

  // ── Rows
  BUCKETS.forEach(bucket => {
    const btasks = vtasks.filter(t => t.bucket === bucket.key);
    if(!btasks.length && bucketFilter !== "ALL") return;
    const isMS = bucket.isMilestone;
    const isC = collapsed[bucket.key];
    const color = bucket.color;

    if(isMS){
      // Milestone group – single row with all milestones
      html += `<div class="gantt-row ms-group-row">`;
      html += `<div class="rl ms-group-row" style="height:var(--ms-row-h)">`;
      html += `<div style="width:6px;height:6px;transform:rotate(45deg);border-radius:1px;background:${color};flex-shrink:0"></div>`;
      html += `<span class="ms-group-label">${esc(bucket.name)}</span>`;
      html += `</div>`;
      html += `<div class="ms-tbars" style="width:${totalW}px;background:${color}0d;border-bottom:1px solid ${color}22">`;
      // Today line with label (only on milestone row = top)
      if(tx>0) html += `<div class="today-line" style="left:${tx}px"><div class="today-label">Heute</div></div>`;
      btasks.forEach(t => {
        const isPoint = t.start === t.end;
        const done = t.status === "completed";
        const stColor = statusColor(t.status, color);
        if(isPoint){
          const x = cx(t.start);
          html += `<div class="ms-diamond" style="left:${x-9}px;top:13px;background:${color};${done?"opacity:.35":""}" onclick="selTask(${t.id})" title="${esc(t.name)}"></div>`;
        } else {
          const x = cx(t.start), w2 = bw(t.start, t.end);
          html += `<div class="ms-bar" style="left:${x}px;width:${w2}px;background:${color};${done?"opacity:.35":""}" onclick="selTask(${t.id})" title="${esc(t.name)}">`;
          if(w2 > 50) html += `<span class="ms-bar-label">${esc(t.name)}</span>`;
          html += `</div>`;
        }
      });
      html += `</div></div>`;
    } else {
      // Regular group header
      const cnt = btasks.length;
      html += `<div class="gantt-row group-row${isC?" collapsed":""}">`;
      html += `<div class="rl" style="height:var(--group-h);border-left:3px solid ${color}" onclick="togGroup('${bucket.key}')">`;
      html += `<div class="group-dot" style="background:${color}"></div>`;
      html += `<span class="group-name" style="color:${color}">${esc(bucket.name)}</span>`;
      html += `<span class="group-count">${cnt}</span>`;
      html += `<span class="collapse-icon">▾</span>`;
      html += `</div>`;
      html += `<div class="group-bars" style="width:${totalW}px;background:${color}09">`;
      if(tx>0) html += `<div class="today-line" style="left:${tx}px"></div>`;
      html += `</div></div>`;

      if(!isC){
        btasks.forEach(t => {
          const isSel = selectedId === t.id;
          const isPoint = t.start === t.end;
          const done = t.status === "completed";
          const pillCls = done ? "completed" : t.status === "in_progress" ? "in-progress" : "not-started";
          const pillDotColor = done ? "var(--accent)" : t.status === "in_progress" ? "var(--today)" : "var(--muted)";
          const pillLabel = done ? "Erledigt" : t.status === "in_progress" ? "Aktiv" : "Offen";

          html += `<div class="gantt-row task-row${isSel?" selected":""}" onclick="selTask('${t.id}')">`;
          html += `<div class="rl" style="height:var(--row-h)">`;
          html += `<div class="status-pill ${pillCls}" title="${ST[t.status].label}">`;
          html += `<span class="status-pill-dot" style="background:${pillDotColor}"></span>${pillLabel}`;
          html += `</div>`;
          html += `<div class="task-name${done?" done":""}">${esc(t.name)}</div>`;
          html += `</div>`;
          html += `<div class="tbars" style="width:${totalW}px">`;
          if(tx>0) html += `<div class="today-line" style="left:${tx}px"></div>`;
          if(isPoint){
            const x = cx(t.start);
            html += `<div class="diamond${done?" done":""}" style="left:${x-7}px;top:12px;background:${color}" onclick="event.stopPropagation();selTask('${t.id}')" title="${esc(t.name)}"></div>`;
          } else {
            const x = cx(t.start), w2 = bw(t.start, t.end);
            html += `<div class="bar${done?" done":""}" style="left:${x}px;width:${w2}px;background:${color}" onclick="event.stopPropagation();selTask('${t.id}')">`;
            if(w2 > 55) html += `<span class="bar-label">${esc(t.name)}</span>`;
            html += `</div>`;
          }
          html += `</div></div>`;
        });
      }
    }
  });

  document.getElementById("ganttInner").innerHTML = html;
  updateBucketFilter();
  updateStats();
}

function buildHeader(totalW){
  let h = `<div class="gantt-hdr">`;
  h += `<div class="hdr-label"><span class="hdr-label-text">Aufgabe</span></div>`;
  h += `<div class="hdr-cols">`;

  if(view === "week"){
    // Month row
    h += `<div class="hdr-months">`;
    let curMonth = "", curW = 0, curTd = false;
    cols.forEach((c,i) => {
      const mk = MDE[c.m]+" "+c.y;
      if(mk !== curMonth){
        if(curMonth) h += `<div class="mc month-label${curTd?" today-month":""}" style="width:${curW}px;min-width:${curW}px">${curMonth}</div>`;
        curMonth = mk; curW = c.w; curTd = c.td;
      } else { curW += c.w; if(c.td) curTd = true; }
    });
    if(curMonth) h += `<div class="mc month-label${curTd?" today-month":""}" style="width:${curW}px;min-width:${curW}px">${curMonth}</div>`;
    h += `</div>`;
    // Week row
    h += `<div class="hdr-units">`;
    cols.forEach(c => {
      let cls = "mc"; if(c.td) cls += " today-col"; if(c.mj) cls += " major";
      const num = c.label.replace("KW ","");
      h += `<div class="${cls}" style="width:${c.w}px;min-width:${c.w}px;font-size:9px"><div style="font-size:7px;opacity:.7">KW</div><div>${num}</div></div>`;
    });
    h += `</div>`;
  } else {
    // For month/quarter: single row header
    h += `<div class="hdr-units" style="height:${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--hdr-h'))||36}px">`;
    cols.forEach(c => {
      let cls = "mc"; if(c.td) cls += " today-col"; if(c.mj) cls += " major";
      h += `<div class="${cls}" style="width:${c.w}px;min-width:${c.w}px">${c.label}</div>`;
    });
    h += `</div>`;
  }

  h += `</div></div>`;
  return h;
}

function statusColor(status, fallback){
  if(status === "completed") return "var(--accent)";
  if(status === "in_progress") return "var(--today)";
  return fallback;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function setView(v){

  render();
  setTimeout(scrollToToday, 60);
}

function setZoom(z){
  const minZ = {week:.3, month:.35, quarter:.4}[view]||.3;
  zoom = Math.min(2.5, Math.max(minZ, z));
  document.getElementById("zs").value = zoom;
  document.getElementById("zl").textContent = Math.round(zoom*100)+"%";
  render();
}
function dz(d){ setZoom(zoom+d); }

function scrollToToday(){
  const x = xDate(today, cols);
  const s = document.getElementById("ganttScroll");
  s.scrollLeft = Math.max(0, x - s.clientWidth/2 + parseInt(getComputedStyle(document.documentElement).getPropertyValue("--label-w"))/2);

// ── PDF EXPORT ────────────────────────────────────────────────────────────────
function openPdfModal(){
  let mn = today, mx = today;
  TASKS.forEach(t=>{const s=pd(t.start),e=pd(t.end);if(s<mn)mn=s;if(e>mx)mx=e;});
  document.getElementById("pdfFrom").value = fmt(mn);
  document.getElementById("pdfTo").value = fmt(mx);
  document.getElementById("pdfViewSel").value = view;
  document.getElementById("pdfModal").classList.add("open");
}
function closePdfModal(){ document.getElementById("pdfModal").classList.remove("open"); }

async function doExportPDF(){
  const from = document.getElementById("pdfFrom").value;
  const to   = document.getElementById("pdfTo").value;
  const pv   = document.getElementById("pdfViewSel").value;
  if(!from||!to){alert("Bitte Zeitraum wählen.");return;}

  document.getElementById("pdfProgressWrap").style.display = "block";
  document.getElementById("pdfBtn").style.display = "none";
  await new Promise(r=>setTimeout(r,60));

  try{
    const pw=297, ph=210, margin=8;
    const DPI=120, mmToPx=DPI/25.4;
    const usableW_mm=pw-margin*2, usableH_mm=ph-margin*2;
    const usableW_px=Math.round(usableW_mm*mmToPx);
    const labelPx=180, timelinePx=usableW_px-labelPx;

    const pCols = buildColsPDF(pv, pd(from), pd(to), 1);
    const baseW = pCols.reduce((a,c)=>a+c.w,0);
    const fitZ  = baseW>0 ? timelinePx/baseW : 1;
    const printCols = buildColsPDF(pv, pd(from), pd(to), fitZ);
    const totalW = printCols.reduce((a,c)=>a+c.w,0);

    const printHTML = buildPrintHTML(printCols, totalW, labelPx, from, to, pv);
    const wrap = document.createElement("div");
    wrap.style.cssText = "position:fixed;top:-99999px;left:-99999px;background:#fef0e3;";
    wrap.innerHTML = printHTML;
    wrap.style.width = (labelPx+totalW)+"px";
    document.body.appendChild(wrap);
    await new Promise(r=>setTimeout(r,280));

    const canvas = await html2canvas(wrap, {
      backgroundColor:"#fef0e3", scale:3,
      useCORS:true, allowTaint:true, logging:false,
      width:labelPx+totalW, height:wrap.scrollHeight
    });
    document.body.removeChild(wrap);

    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({orientation:"landscape",unit:"mm",format:[pw,ph]});
    const imgData = canvas.toDataURL("image/jpeg", 0.93);
    const imgW_mm = usableW_mm;
    const imgH_mm = (canvas.height/canvas.width)*imgW_mm;
    if(imgH_mm <= usableH_mm) doc.addImage(imgData,"JPEG",margin,margin,imgW_mm,imgH_mm);
    else doc.addImage(imgData,"JPEG",margin,margin,imgW_mm*(usableH_mm/imgH_mm),usableH_mm);
    doc.save("Zeitplan_AC2026.pdf");
  } catch(err){
    alert("Fehler: "+err.message);
  }

  document.getElementById("pdfProgressWrap").style.display = "none";
  document.getElementById("pdfBtn").style.display = "";
  closePdfModal();
}

function buildColsPDF(v, minD, maxD, z){
  const res=[], w=k=>Math.round(BW[k]*z);
  if(v==="week"){
    let d=new Date(minD);const dow=d.getDay();if(dow!==1)d.setDate(d.getDate()-(dow===0?6:dow-1));
    while(d<=maxD){const kw=getKW(d);const fi=d.getDate()<=7;res.push({label:`KW ${kw}`,date:new Date(d),w:w("week"),mj:fi,m:d.getMonth(),y:d.getFullYear()});d=ad(d,7);}
  } else if(v==="quarter"){
    let y=minD.getFullYear(),q=Math.floor(minD.getMonth()/3);const ey=maxD.getFullYear(),eq=Math.floor(maxD.getMonth()/3);
    while(y<ey||(y===ey&&q<=eq)){const m=q*3;res.push({label:`Q${q+1} ${y}`,date:new Date(y,m,1),w:w("quarter"),mj:true,y,q,m});q++;if(q>3){q=0;y++;}}
  } else {
    let y=minD.getFullYear(),m=minD.getMonth();const ey=maxD.getFullYear(),em=maxD.getMonth();
    while(y<ey||(y===ey&&m<=em)){res.push({label:`${MDE[m]} ${String(y).slice(2)}`,date:new Date(y,m,1),w:w("month"),mj:m%3===0,y,m});m++;if(m>11){m=0;y++;}}
  }
  return res;
}

function xDateP(dt, c, pv){
  if(!c||!c.length) return 0;
  const total=c.reduce((a,x)=>a+x.w,0);
  const last=c[c.length-1];
  let le;
  if(pv==="week") le=ad(last.date,7);
  else if(pv==="quarter") le=new Date(last.y,last.m+3,1);
  else le=new Date(last.y,last.m+1,1);
  const s=c[0].date;
  if(dt<=s) return 0; if(dt>=le) return total;
  return ((dt-s)/(le-s))*total;
}

function buildPrintHTML(c, totalW, lw, fromStr, toStr, pv){
  const bg="#fef0e3", surf="#f5e4d0", bdr="rgba(10,71,56,.08)", bdr2="rgba(10,71,56,.16)", txt="#0a4738", mut="#5a8272";
  const RH=22, GH=20, MSH=28, HDR=28;
  let h=`<div style="font-family:Arial,sans-serif;background:${bg};color:${txt}">`;
  // Title
  h+=`<div style="padding:7px 10px;border-bottom:1px solid ${bdr2};display:flex;justify-content:space-between;align-items:center;background:${surf}">`;
  h+=`<span style="font-size:13px;font-weight:700">Zeitplan · AC 2026</span>`;
  h+=`<span style="font-size:9px;color:${mut}">${fde(fromStr)} – ${fde(toStr)}</span></div>`;
  // Header
  h+=`<div style="display:flex;border-bottom:2px solid ${bdr2}">`;
  h+=`<div style="width:${lw}px;min-width:${lw}px;height:${HDR}px;display:flex;align-items:flex-end;padding:0 10px 5px;font-size:8px;color:${mut};border-right:1px solid ${bdr2};text-transform:uppercase;letter-spacing:.5px">Aufgabe</div>`;
  h+=`<div style="display:flex;height:${HDR}px">`;
  c.forEach(col=>{
    const fw=col.mj?"700":"400";
    h+=`<div style="width:${col.w}px;min-width:${col.w}px;display:flex;align-items:center;justify-content:center;font-size:8px;color:${mut};border-right:1px solid ${bdr};font-weight:${fw};text-align:center;flex-shrink:0">${col.label}</div>`;
  });
  h+=`</div></div>`;
  // Rows
  BUCKETS.forEach(bucket=>{
    const color=bucket.color;
    const btasks=TASKS.filter(t=>t.bucket===bucket.key);
    if(!btasks.length) return;
    const rowH=bucket.isMilestone?MSH:GH;
    // Group header
    h+=`<div style="display:flex;height:${rowH}px;border-bottom:1px solid ${bdr}">`;
    h+=`<div style="width:${lw}px;min-width:${lw}px;padding:0 10px;display:flex;align-items:center;gap:5px;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:${color};background:${color}12;border-right:1px solid ${bdr2}">`;
    h+=`<div style="width:5px;height:5px;${bucket.isMilestone?"transform:rotate(45deg);":""}border-radius:1px;background:${color}"></div>${esc(bucket.name)}</div>`;
    h+=`<div style="flex:1;position:relative;height:${rowH}px;background:${color}09">`;
    if(bucket.isMilestone){
      btasks.forEach(t=>{
        const isP=t.start===t.end;
        const x=xDateP(pd(t.start),c,pv);
        const done=t.status==="completed";
        const op=done?.35:1;
        if(isP){
          h+=`<div style="position:absolute;width:13px;height:13px;transform:rotate(45deg);border-radius:2px;background:${color};opacity:${op};left:${x-6}px;top:${(rowH-13)/2}px"></div>`;
        } else {
          const w2=Math.max(xDateP(ad(pd(t.end),1),c,pv)-x,4);
          h+=`<div style="position:absolute;left:${x}px;width:${w2}px;height:18px;top:${(rowH-18)/2}px;background:${color};opacity:${op};border-radius:3px;display:flex;align-items:center">`;
          if(w2>50) h+=`<span style="font-size:9px;font-weight:700;padding:0 6px;color:rgba(255,255,255,.93);white-space:nowrap;overflow:hidden">${esc(t.name)}</span>`;
          h+=`</div>`;
        }
      });
    }
    h+=`</div></div>`;
    if(!bucket.isMilestone){
      btasks.forEach(t=>{
        const isP=t.start===t.end;
        const x=xDateP(pd(t.start),c,pv);
        const done=t.status==="completed";
        const op=done?.35:1;
        h+=`<div style="display:flex;height:${RH}px;border-bottom:1px solid ${bdr}">`;
        h+=`<div style="width:${lw}px;min-width:${lw}px;padding:0 10px;display:flex;align-items:center;gap:5px;border-right:1px solid ${bdr2}">`;
        h+=`<div style="width:5px;height:5px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
        h+=`<span style="font-size:9px;${done?"text-decoration:line-through;opacity:.5":""}white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</span>`;
        h+=`</div>`;
        h+=`<div style="flex:1;position:relative;height:${RH}px">`;
        if(isP){
          h+=`<div style="position:absolute;width:9px;height:9px;transform:rotate(45deg);border-radius:1px;background:${color};opacity:${op};left:${x-4}px;top:${(RH-9)/2}px"></div>`;
        } else {
          const w2=Math.max(xDateP(ad(pd(t.end),1),c,pv)-x,4);
          h+=`<div style="position:absolute;left:${x}px;width:${w2}px;height:14px;top:${(RH-14)/2}px;background:${color};opacity:${op};border-radius:3px"></div>`;
        }
        h+=`</div></div>`;
      });
    }
  });
  // Legend
  h+=`<div style="display:flex;align-items:center;gap:12px;padding:6px 10px;border-top:1px solid ${bdr2};font-size:8px;color:${mut}">`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:6px;height:6px;border-radius:50%;background:#aaa;outline:1px solid #888;display:inline-block"></span>Nicht begonnen</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:6px;height:6px;border-radius:50%;background:#b06000;display:inline-block"></span>In Bearbeitung</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:6px;height:6px;border-radius:50%;background:#0a4738;display:inline-block"></span>Abgeschlossen</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;transform:rotate(45deg);background:#888;opacity:.7;display:inline-block;border-radius:1px"></span>Einzeltermin</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:18px;height:6px;background:#888;opacity:.7;display:inline-block;border-radius:2px"></span>Zeitraum</span>`;
  h+=`</div></div>`;
  return h;
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e=>{
  if(e.key==="Escape") closeDetail();
  if((e.key==="+"||e.key==="=")&&(e.ctrlKey||e.metaKey)){e.preventDefault();dz(.2);}
  if(e.key==="-"&&(e.ctrlKey||e.metaKey)){e.preventDefault();dz(-.2);}
});

document.getElementById("ganttScroll").addEventListener("wheel", e=>{
  if(!e.ctrlKey&&!e.metaKey) return;
  e.preventDefault();
  dz(e.deltaY>0?-.15:.15);
},{passive:false});

window.matchMedia("(prefers-color-scheme:dark)").addEventListener("change", ()=>render());

// ── INIT ──────────────────────────────────────────────────────────────────────
// Kein Demo-Render – leerer Zustand bis Planner geladen hat
TASKS = [];
render();
initAuth();
</script>
</body>
</html>
